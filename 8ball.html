  }

    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-5px, 0); }
    40% { transform: translate(5px, 0); }
    60% { transform: translate(-5px, 0); }
    80% { transform: translate(5px, 0); }
  }

  .shaking {
    animation: shake 0.2s ease-in-out infinite;

  }

  .snap-back {
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
  }

  /* Floating animation removed */
</style>

  const handle = document.getElementById('pullHandle');
  const track = document.getElementById('pullTrack');
  const sphere = document.getElementById('sphere');
  const sphereContainer = document.getElementById('sphereContainer');
  const windowInner = document.getElementById('window');
  const messageDisplay = document.createElement('div');
  messageDisplay.className = 'message-display';
  messageDisplay.id = 'messageDisplay';
  document.getElementById('app').insertBefore(messageDisplay, document.getElementById('sphereContainer').nextSibling);
  const idleMark = document.getElementById('idleMark');
  const themeToggle = document.getElementById('themeToggle');
  
  let isDragging = false;
  let startY = 0;
  let currentY = 0;
  let isProcessing = false;
  let mouseX = 0;
  let mouseY = 0;
  let targetRotateX = 0;
  let targetRotateY = 0;
  let currentRotateX = 0;
  let currentRotateY = 0;
  let isRevealed = false;

  
  let isMouseDown = false;
  let lastMouseX = 0;
  let lastMouseY = 0;
  let rotationX = 0;
  let rotationY = 0;
  
  sphereContainer.addEventListener('mousedown', (e) => {
    if (isProcessing) return;
    isMouseDown = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    sphereContainer.style.cursor = 'grabbing';
  });
  
  document.addEventListener('mousemove', (e) => {
    if (isProcessing || !isMouseDown) return;
    
    
    const deltaX = e.clientX - lastMouseX;
    const deltaY = e.clientY - lastMouseY;
    
    rotationY += deltaX * 0.5;
    rotationX -= deltaY * 0.5;
    
    
    rotationX = Math.max(-90, Math.min(90, rotationX));
    
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    
    sphere.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
  });
  
  document.addEventListener('mouseup', () => {
    isMouseDown = false;
    sphereContainer.style.cursor = 'grab';
  });

  
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (prefersDark) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  });
  
  // Mobile theme toggle
  const themeToggleMobile = document.getElementById('themeToggleMobile');
  if (themeToggleMobile) {
    themeToggleMobile.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    });
  }

  
  let lastTapTime = 0;
  sphereContainer.addEventListener('click', (e) => {
    const currentTime = new Date().getTime();
    const tapInterval = currentTime - lastTapTime;
    
    if (tapInterval < 300 && tapInterval > 0) {
      
      e.preventDefault();
      resetRotation();
    } else if (!isProcessing && isRevealed) {
      
      resetToEightBall();
    }
    
    lastTapTime = currentTime;
  });

  function resetRotation() {
    
    sphere.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
    rotationX = 0;
    rotationY = 0;
    sphere.style.transform = `rotateX(0deg) rotateY(0deg)`;
    
    
    setTimeout(() => {
      sphere.style.transition = '';
    }, 600);
  }

  function resetToEightBall() {
    windowInner.classList.remove('is-revealed');
    windowInner.classList.add('is-thinking');
    const msgDisplay = document.getElementById('messageDisplay');
    const answerText = document.getElementById('answerText');
    const clovers = document.querySelectorAll('.clover');
    
    if (msgDisplay) msgDisplay.innerText = '';
    if (answerText) answerText.innerText = '';
    clovers.forEach(c => c.classList.remove('filled'));
    
    setTimeout(() => {
      windowInner.classList.remove('is-thinking');
      isRevealed = false;
    }, 300);
  }

  const trackHeight = 160;
  const padding = 8;
  const handleHeight = 42;
  const maxTravel = trackHeight - handleHeight - (padding * 2);
  const threshold = maxTravel * 0.8; 

  handle.addEventListener('pointerdown', (e) => {
    if (isProcessing) return;
    isDragging = true;
    startY = e.clientY;
    handle.classList.remove('snap-back');
    handle.classList.add('is-dragging');
    handle.setPointerCapture(e.pointerId);
  });

  document.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    
    let deltaY = e.clientY - startY;
    
    if (deltaY < 0) deltaY = 0;
    if (deltaY > maxTravel) deltaY = maxTravel;
    
    currentY = deltaY;
    handle.style.transform = `translateY(${currentY}px)`;
    
    const tension = currentY / maxTravel;
    sphere.style.setProperty('--lightX', `${25 + tension * 5}%`);
    sphere.style.setProperty('--lightY', `${20 + tension * 10}%`);
  });

  document.addEventListener('pointerup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    handle.classList.remove('is-dragging');
    handle.classList.add('snap-back');
    
    if (currentY >= threshold) {
      handle.style.transform = `translateY(0px)`;
      triggerSpin();
    } else {
      handle.style.transform = `translateY(0px)`;
      sphere.style.setProperty('--lightX', '25%');
      sphere.style.setProperty('--lightY', '20%');
    }
    currentY = 0;
  });

  function triggerSpin() {
    isProcessing = true;
    isRevealed = true;
    
    
    targetRotateX = 0;
    targetRotateY = 0;
    currentRotateX = 0;
    currentRotateY = 0;
    
    windowInner.classList.remove('is-revealed');
    windowInner.classList.add('is-thinking');
    
    
    sphere.classList.add('shaking');
    sphere.classList.remove('sphere-float');
    
    
    sphereContainer.style.transform = 'scale(0.98)';
    setTimeout(() => {
      sphereContainer.style.transform = 'scale(1)';
    }, 100);
    
    setTimeout(() => {
      sphere.classList.remove('shaking');
      sphere.classList.add('sphere-float');
      
      
      const randomMsgObj = messages[Math.floor(Math.random() * messages.length)];
      const answerText = document.getElementById('answerText');
      const cloverStars = document.getElementById('cloverStars');
      
      
      if (answerText) {
        answerText.innerText = randomMsgObj.text;
      }
      
      
      if (cloverStars) {
        const clovers = cloverStars.querySelectorAll('.clover');
        clovers.forEach((clover, index) => {
          clover.classList.remove('filled');
          if (index < randomMsgObj.rating) {
            clover.classList.add('filled');
          }
        });
      }
      

      
      
      const msgDisplay = document.getElementById('messageDisplay');
      if (msgDisplay) {
        msgDisplay.style.opacity = '0';
        msgDisplay.style.transform = 'translateY(10px)';
        setTimeout(() => {
          msgDisplay.innerText = randomMsgObj.text;
          msgDisplay.style.opacity = '1';
          msgDisplay.style.transform = 'translateY(0)';
        }, 100);
      }
      
      
      setTimeout(() => {
        windowInner.classList.remove('is-thinking');
        windowInner.classList.add('is-revealed');
        isProcessing = false;
      }, 200);
      
    }, 1500); 
  }

  
  idleMark.style.display = 'flex';

  
  let titleClickCount = 0;
  let titleClickTimer;
  let isSquareMode = false;
  
  document.querySelector('.title').addEventListener('click', () => {
    titleClickCount++;
    clearTimeout(titleClickTimer);
    titleClickTimer = setTimeout(() => {
      titleClickCount = 0;
    }, 1000);
    
    if (titleClickCount === 5) {
      const msgDisplay = document.getElementById('messageDisplay');
      
      if (!isSquareMode) {
        
        isSquareMode = true;
        sphere.style.borderRadius = '4px';
        sphere.style.width = '280px';
        sphere.style.height = '280px';
        sphere.style.left = '30px';
        sphere.style.top = '30px';
        
        document.querySelector('.window-outer').style.borderRadius = '2px';
        document.querySelector('.window-inner').style.borderRadius = '0px';
        
        // 모든 UI를 네모로 변경
        document.querySelector('.theme-toggle').style.borderRadius = '4px';
        document.querySelector('.pull-mechanism').style.borderRadius = '8px';
        document.querySelector('.pull-handle').style.borderRadius = '4px';
        document.querySelector('.title').style.fontFamily = "'Courier New', 'Monaco', monospace";
        document.querySelector('.subtitle').style.fontFamily = "'Courier New', 'Monaco', monospace";
        document.querySelector('.answer-text').style.fontFamily = "'Courier New', 'Monaco', monospace";
        document.querySelector('.instructions span').style.fontFamily = "'Courier New', 'Monaco', monospace";
        document.querySelector('.reset-hint').style.fontFamily = "'Courier New', 'Monaco', monospace";
        
        // 모든 텍스트 굵게 네모스럽게
        document.querySelectorAll('.slot-item').forEach(item => {
          item.style.fontFamily = "'Courier New', 'Monaco', monospace";
          item.style.fontWeight = "900";
        });
        
        if (msgDisplay) {
          msgDisplay.innerText = 'CUBE MODE';
          msgDisplay.style.opacity = '1';
          msgDisplay.style.fontFamily = "'Courier New', 'Monaco', monospace";
        }
      } else {
        
        isSquareMode = false;
        sphere.style.borderRadius = '50%';
        sphere.style.width = '100%';
        sphere.style.height = '100%';
        sphere.style.left = '';
        sphere.style.top = '';
        sphere.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
        
        document.querySelector('.window-outer').style.borderRadius = '50%';
        document.querySelector('.window-inner').style.borderRadius = '50%';
        
        // 원래 UI로 복원
        document.querySelector('.theme-toggle').style.borderRadius = '50%';
        document.querySelector('.pull-mechanism').style.borderRadius = '32px';
        document.querySelector('.pull-handle').style.borderRadius = '50%';
        document.querySelector('.title').style.fontFamily = "";
        document.querySelector('.subtitle').style.fontFamily = "";
        document.querySelector('.answer-text').style.fontFamily = "";
        document.querySelector('.instructions span').style.fontFamily = "";
        document.querySelector('.reset-hint').style.fontFamily = "";
        
        document.querySelectorAll('.slot-item').forEach(item => {
          item.style.fontFamily = "";
        });
        
        if (msgDisplay) {
          msgDisplay.innerText = 'SPHERE MODE';
          msgDisplay.style.opacity = '1';
          msgDisplay.style.fontFamily = "";
        }
      }
      
      titleClickCount = 0;
      
      
      setTimeout(() => {
        if (msgDisplay && !isRevealed) msgDisplay.style.opacity = '0';
      }, 2000);
    }
  });
  
  

  
  

</script>
